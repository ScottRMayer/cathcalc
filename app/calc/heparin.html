<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#00548b">
<meta name="theme-color" content="#02233a" media="(prefers-color-scheme: dark)">
<link rel="manifest" href="../manifest.webmanifest">
<link rel="icon" href="../assets/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="../assets/icon-192.png">
<link rel="stylesheet" href="../assets/app.css?v=3.7.0">
<title>Heparin dose · Cath Lab Tools</title>
</head>
<body>
<div class="wrap">
  <div id="shell-top"></div>

  <div class="card">
    <h2>Heparin dose</h2>
    <p class="desc">Weight-based bolus.</p>
    <div class="dual">
      <div class="box"><div class="lab">Diagnostic · 50 U/kg</div><div class="big" style="font-size:2.05rem"><span id="hepDiag">—</span> <span class="u">U</span></div><div class="derived" id="hepDiagR"></div></div>
      <div class="box"><div class="lab">Intervention · 70 U/kg</div><div class="big" style="font-size:2.05rem"><span id="hepInt">—</span> <span class="u">U</span></div><div class="derived" id="hepIntR"></div></div>
    </div>
    <div class="derived em" id="hepWt"></div>
    <div class="flag" id="hepCap"></div>
    <div class="err" id="hepErr"></div>
    <div class="note">Rounded to nearest 100 U. Titrate to ACT per protocol. With GP IIb/IIIa inhibitors, protocols typically reduce the bolus to 50–60 U/kg.</div>
  </div>

  <div id="shell-bottom"></div>
</div>
<script src="../assets/core.js?v=3.7.0"></script>
<script>
function render(){
  var P=CM.patient(), $=CM.$;
  if(P.kg==null){ $('hepDiag').textContent=$('hepInt').textContent='—';
    $('hepDiagR').textContent=$('hepIntR').textContent='';
    $('hepWt').textContent=''; $('hepCap').textContent=''; $('hepCap').className='flag';
    $('hepErr').textContent='Enter weight.'; return; }
  $('hepErr').textContent='';
  var d=CM.F.heparinDose(P.kg,50), i=CM.F.heparinDose(P.kg,70);
  $('hepDiag').textContent=CM.fmt(Math.round(d));
  $('hepInt').textContent=CM.fmt(Math.round(i));
  $('hepDiagR').textContent='≈ '+CM.fmt(CM.round100(d))+' U';
  $('hepIntR').textContent='≈ '+CM.fmt(CM.round100(i))+' U';
  /* dose-defining weight, visible without opening the patient panel */
  $('hepWt').textContent='Based on '+P.kg.toFixed(1)+' kg ('+(P.kg*2.20462).toFixed(0)+' lb)';
  /* presentation-only caution — computed values unchanged */
  if(Math.round(i)>10000||Math.round(d)>10000){
    $('hepCap').textContent='Above 10,000 U — many protocols cap the initial bolus; verify per your lab’s protocol.';
    $('hepCap').className='flag warn'; }
  else{ $('hepCap').textContent=''; $('hepCap').className='flag'; }
  CM.announce('Heparin PCI '+CM.fmt(Math.round(i))+' units');
}
CM.init({title:'Heparin dose', copy:function(){
  var $=CM.$, P=CM.patient();
  return 'Clara Maass CMC — Heparin: dx '+$('hepDiag').textContent+' U / PCI '+$('hepInt').textContent+' U'
    +(P.kg!=null?(' (based on '+P.kg.toFixed(1)+' kg)'):'')+' ('+new Date().toLocaleString('en-US')+')';
}});
CM.onChange(render); render();
</script>
</body>
</html>
