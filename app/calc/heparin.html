<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#00548b">
<link rel="manifest" href="../manifest.webmanifest">
<link rel="icon" href="../assets/icon.svg" type="image/svg+xml">
<link rel="stylesheet" href="../assets/app.css">
<title>Heparin dose · Cath Lab Tools</title>
</head>
<body>
<div class="wrap">
  <div id="shell-top"></div>

  <div class="card">
    <h2>Heparin dose</h2>
    <p class="desc">Weight-based bolus.</p>
    <div class="dual">
      <div class="box"><div class="lab">Diagnostic · 50 U/kg</div><div class="big"><span id="hepDiag">—</span> <span class="u">U</span></div><div class="derived" id="hepDiagR"></div></div>
      <div class="box"><div class="lab">Intervention · 70 U/kg</div><div class="big"><span id="hepInt">—</span> <span class="u">U</span></div><div class="derived" id="hepIntR"></div></div>
    </div>
    <div class="err" id="hepErr"></div>
    <div class="note">Rounded to nearest 100 U. Titrate to ACT per protocol.</div>
  </div>

  <div id="shell-bottom"></div>
</div>
<script src="../assets/core.js"></script>
<script>
function render(){
  var P=CM.patient(), $=CM.$;
  if(P.kg==null){ $('hepDiag').textContent=$('hepInt').textContent='—';
    $('hepDiagR').textContent=$('hepIntR').textContent=''; $('hepErr').textContent='Enter weight.'; return; }
  $('hepErr').textContent='';
  var d=CM.F.heparinDose(P.kg,50), i=CM.F.heparinDose(P.kg,70);
  $('hepDiag').textContent=CM.fmt(Math.round(d));
  $('hepInt').textContent=CM.fmt(Math.round(i));
  $('hepDiagR').textContent='≈ '+CM.fmt(CM.round100(d))+' U';
  $('hepIntR').textContent='≈ '+CM.fmt(CM.round100(i))+' U';
  CM.announce('Heparin PCI '+CM.fmt(Math.round(i))+' units');
}
CM.init({title:'Heparin dose', copy:function(){
  var $=CM.$; return 'Clara Maass CMC — Heparin: dx '+$('hepDiag').textContent+' U / PCI '+$('hepInt').textContent+' U ('+new Date().toLocaleString('en-US')+')';
}});
CM.onChange(render); render();
</script>
</body>
</html>
