<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#00548b">
<meta name="theme-color" content="#02233a" media="(prefers-color-scheme: dark)">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="assets/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="assets/icon-192.png">
<link rel="stylesheet" href="assets/app.css?v=3.9.0">
<title>Cath Lab Tools · Clara Maass Medical Center</title>
</head>
<body>
<div class="wrap">
  <div id="shell-top"></div>

  <div class="note" style="margin:2px 0 14px">
    Decision-support calculators only. Enter <strong>de-identified</strong> clinical
    values in the patient panel above — weight, labs and eGFR are shared with every
    tool. No patient names, initials, dates or free-text notes are collected or stored.
  </div>

  <!-- ============================ TOOL LIBRARY ============================ -->
  <details class="card" id="toolLib" open>
    <summary style="cursor:pointer;font-weight:800;font-size:1.02rem;color:var(--brand-blue)">All tools <span class="hint">(every calculator, grouped by phase)</span></summary>
    <div id="libBody"></div>
  </details>

  <div id="shell-bottom"></div>
</div>
<script src="assets/core.js?v=3.9.0"></script>
<script>
(function(){
  var $=CM.$;

  /* tool library: every calculator grouped by phase (the dock truncates on phones) */
  function buildLib(){
    var host=$('libBody'); if(!host) return;
    var groups=[{k:'pre',t:'Pre-procedure'},{k:'intra',t:'Intra-procedure'},{k:'post',t:'Post / disposition'}], html='';
    groups.forEach(function(gr){
      var items=CM.NAV.filter(function(n){ return n.phase===gr.k && n.href!=='index.html'; });
      if(!items.length) return;
      html+='<div class="libgroup">'+gr.t+'</div><div class="libgrid">';
      items.forEach(function(n){
        html+='<a class="libcard cat-'+n.cat+'" href="'+n.href+'"><span class="t">'+CM.esc(n.label)+'</span></a>';
      });
      html+='</div>';
    });
    host.innerHTML=html;
  }

  CM.init({
    title:'Cath Lab Tools',
    desc:'De-identified peri-procedure calculators — enter the shared clinical values once and they flow into every tool.',
    home:true
  });
  buildLib();
})();
</script>
</body>
</html>
