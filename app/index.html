<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#00548b">
<meta name="theme-color" content="#02233a" media="(prefers-color-scheme: dark)">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="assets/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="assets/icon-192.png">
<link rel="stylesheet" href="assets/app.css?v=3.9.0">
<title>Cath Lab Tools · Clara Maass Medical Center</title>
</head>
<body>
<div class="wrap">
  <div id="shell-top"></div>

  <div class="note" style="margin:2px 0 14px">
    Decision-support calculators only. Enter <strong>de-identified</strong> clinical
    values in the patient panel above — weight, labs and eGFR are shared with every
    tool. No patient names, initials, dates or free-text notes are collected or stored.
  </div>

  <div class="card">
    <h2>Calculators</h2>
    <div id="libBody"></div>
  </div>

  <div id="shell-bottom"></div>
</div>
<script src="assets/core.js?v=3.9.0"></script>
<script>
(function(){
  var $=CM.$;

  /* simple flat list of every calculator */
  function buildLib(){
    var host=$('libBody'); if(!host) return;
    var items=CM.NAV.filter(function(n){ return n.href!=='index.html'; });
    host.innerHTML='<div class="libgrid">'+items.map(function(n){
      return '<a class="libcard cat-'+n.cat+'" href="'+n.href+'"><span class="t">'+CM.esc(n.label)+'</span></a>';
    }).join('')+'</div>';
  }

  CM.init({
    title:'Cath Lab Tools',
    desc:'Enter the shared clinical values once — they flow into every calculator.',
    home:true
  });
  buildLib();
})();
</script>
</body>
</html>
